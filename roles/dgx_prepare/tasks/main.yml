---
- name: Configure QSFP network interfaces
  ansible.builtin.import_tasks: qsfp_network.yml
  tags: qsfp

- name: Configure SR-IOV on QSFP interface
  ansible.builtin.import_tasks: qsfp_sriov.yml
  tags: qsfp_sriov

- name: Manual DCBX/PFC on QSFP NIC
  ansible.builtin.import_tasks: qsfp_dcbx.yml
  tags: qsfp_dcbx

- name: Configure ulimits
  ansible.builtin.import_tasks: ulimits.yml
  tags: ulimits

- name: Configure host-level HuggingFace environment
  ansible.builtin.import_tasks: hf_env.yml
  tags: hf_env

- name: Install NVIDIA DGX Spark APT repository package
  ansible.builtin.import_tasks: spark_repo.yml
  tags: spark_repo

- name: Protect DGX-OS platform packages from apt autoremove
  ansible.builtin.import_tasks: protect_platform_pkgs.yml
  tags: protect_pkgs

- name: NVIDIA CDI and driver setup
  ansible.builtin.import_tasks: nvidia_setup.yml
  tags: nvidia

- name: Install ConnectX firmware tooling (MFT) and report firmware
  ansible.builtin.import_tasks: mlxfw.yml
  tags: mlxfw

- name: Configure CPU power settings
  ansible.builtin.import_tasks: cpupower.yml
  tags: cpupower

- name: Set kernel parameters
  ansible.builtin.import_tasks: kernel_params.yml
  tags: kernel

- name: Disable GUI / graphical target
  ansible.builtin.import_tasks: disable_gui.yml
  tags: disable_gui

- name: Install extra CNI plugins for Multus
  ansible.builtin.import_tasks: cni_plugins.yml
  tags: cni

- name: Set up PyTorch virtual environment
  ansible.builtin.import_tasks: pytorch_venv.yml
  tags: pytorch

- name: Ensure SSH keys and cross-trust between sparks
  ansible.builtin.import_tasks: ssh_keys.yml
  tags: ssh_keys

- name: Manage disk-backed swapfile (node swap)
  ansible.builtin.import_tasks: swap.yml
  tags: swap
