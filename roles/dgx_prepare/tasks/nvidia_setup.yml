---
- name: Ensure /etc/cdi directory exists
  ansible.builtin.file:
    path: /etc/cdi
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if NVIDIA driver is loaded
  ansible.builtin.command:
    cmd: nvidia-smi --query-gpu=driver_version --format=csv,noheader
  register: nvidia_driver_check
  changed_when: false
  failed_when: false

# The CDI spec pins version-suffixed driver libs (libnvidia-*.so.<driver>), so a
# driver upgrade makes {{ nvidia_cdi_output }} stale. A `creates:` guard only covers
# the missing-file case and would NEVER refresh after a version bump. Instead detect
# drift: regenerate when the spec is absent OR does not reference the running driver
# version. (The k8s runtime spec /var/run/cdi is regenerated by the device-plugin.)
- name: Check whether the CDI spec matches the running driver
  ansible.builtin.command:
    cmd: "grep -qsF -- {{ nvidia_driver_check.stdout | trim | quote }} {{ nvidia_cdi_output }}"
  register: nvidia_cdi_current
  changed_when: false
  failed_when: false
  when: nvidia_driver_check.rc == 0

- name: Generate NVIDIA CDI spec (missing or driver version changed)
  ansible.builtin.command:
    cmd: "nvidia-ctk cdi generate --output={{ nvidia_cdi_output }}"
  register: nvidia_cdi_generate
  changed_when: nvidia_cdi_generate.rc == 0
  when:
    - nvidia_driver_check.rc == 0
    - nvidia_cdi_current.rc | default(1) != 0

- name: Verify nvidia-smi works
  ansible.builtin.command:
    cmd: nvidia-smi
  register: nvidia_smi_result
  changed_when: false

- name: Fail if nvidia-smi returned non-zero exit code
  ansible.builtin.fail:
    msg: "nvidia-smi failed with rc={{ nvidia_smi_result.rc }}. Output: {{ nvidia_smi_result.stderr }}"
  when: nvidia_smi_result.rc != 0
