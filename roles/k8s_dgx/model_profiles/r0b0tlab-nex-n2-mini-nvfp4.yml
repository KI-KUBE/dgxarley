---
# Model profile: r0b0tlab/nex-n2-mini-nvfp4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# Community NVFP4 re-package (r0b0tlab) of nex-agi/Nex-N2-mini — the SMALL sibling
# of nex-agi/Nex-N2-Pro (see razielxyz-nex-n2-pro-nvfp4.yml). This IS the base
# model the Nex-N2 family card documents, so the card facts apply directly:
# https://huggingface.co/nex-agi/Nex-N2-mini (Apache 2.0, "Agentic Thinking"
# reasoning/coding model). Architecture facts from this quant's config.json +
# hf_quant_config.json.
#
# >>> ARCHITECTURE = Qwen3.5-MoE (config.json: architectures
# "Qwen3_5MoeForConditionalGeneration", model_type qwen3_5_moe) — SAME class as
# the Pro and the nvidia/Qwen3.5-*-NVFP4 profiles, so this SEEDS the matrix-
# validated nvidia/Qwen3.5-122B-A10B-NVFP4 knobs (modelopt_fp4 loader,
# flashinfer_cutlass MoE+FP4-GEMM, triton attn, EP=1, extra_buffer, NEXTN s3/d4).
# config.json facts (SMALLER than the Pro):
#   * 40 layers, hidden 2048, 16 attn heads, num_key_value_heads 2 (GQA),
#     head_dim 256, partial_rotary_factor 0.25, rope_theta 1e7 (rope_type default
#     → NO YaRN), mrope (mrope_section [11,11,10]), vocab 248320.
#   * HYBRID attention: 3 linear_attention (Gated-DeltaNet: 16 K / 32 V heads,
#     head_dim 128, conv_kernel 4) + 1 full_attention, full_attention_interval 4
#     across 40 layers → --mamba-scheduler-strategy extra_buffer is MANDATORY
#     (base mini card sets it; also the radix-cache/MTP requirement).
#   * MoE: num_experts 256, num_experts_per_tok 8 (the "A3B" = ~3B active params),
#     moe_intermediate_size 512, shared_expert_intermediate_size 512 (1 shared).
#   * MULTIMODAL: vision tower (27 layers, hidden 1152, patch 16),
#     image_token_id/video_token_id → text+image+video (vision excluded from quant).
#   * Native 1-layer MTP head (mtp_num_hidden_layers 1, mtp_use_dedicated_
#     embeddings false) → NEXTN works like the validated 122B/397B siblings.
#     STAGED but OFF (see MTP block).
#   * Quant: hf_quant_config.json → ModelOpt v0.44.0, NVFP4, group_size 16,
#     87 modules excluded (lm_head / linear-attn / some self-attn / shared-expert
#     gates / ALL vision stay BF16). KV-cache NOT pre-scaled by the quant (null) —
#     we still set kv_cache_dtype fp8_e4m3 at runtime (family standard).
#     → quantization=modelopt_fp4 (NOT compressed-tensors).
#
# FOOTPRINT: ~24.8 GB NVFP4 weights (4 shards; base Nex-N2-mini is 35B / A3B) →
# only ~6.2 GB/GPU at TP=4. TINY — huge KV headroom; mem_fraction can go high once
# a clean boot confirms (start conservative for first-contact).
#
# Base mini card recommended SGLang launch (this exact model):
#   python -m sglang.launch_server --model-path <model> --tp 2 \
#     --reasoning-parser qwen3 --tool-call-parser qwen3_coder \
#     --mamba-scheduler-strategy extra_buffer
# (We run TP=4 across the 4 sparks instead of the card's --tp 2.)
#
# >>> UNVALIDATED on this cluster — NO boot/matrix run yet. Everything below is
# >>> SEEDED from the validated nvidia/Qwen3.5-122B-A10B-NVFP4 profile (identical
# >>> qwen3_5_moe arch). First boot IS the validation; the vision path is
# >>> UNVERIFIED. Given how small this is, TP could likely drop to 1 (single
# >>> Spark) to free the other 3 — left at TP=4 for cluster consistency / KV.
_model_profile:
  "r0b0tlab/nex-n2-mini-nvfp4":
    knowledge_cutoff: null  # not published (Nex-N2 family card silent)
    release_date: null  # Nex-N2 family; no dated release found on the card
    info_url: "https://huggingface.co/r0b0tlab/nex-n2-mini-nvfp4"
    nccl_transport: "roce"
    tp_size: 4
    context_length: 262144  # config.json max_position_embeddings; rope_type default → no YaRN
    quantization: "modelopt_fp4"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"  # runtime KV (the quant left KV unscaled)
    # Weights are tiny (~6.2 GB/GPU at TP=4) → massive KV headroom. 0.60 is a
    # conservative first-contact start; raise toward 0.85 once a clean boot
    # confirms (keep ~0.10 lower when MTP is enabled, for the draft KV).
    mem_fraction_static: "0.60"
    # NVFP4 MoE backend: flashinfer_cutlass — validated 122B/397B-NVFP4 winner
    # (standalone "cutlass" runner removed in 0.5.12; flashinfer_trtllm crashes at
    # boot on GB10). triton attn + fi_cutlass FP4 GEMM to match.
    moe_runner_backend: "flashinfer_cutlass"
    attention_backend: "triton"  # validated on the 122B twin; A/B flashinfer on the matrix run
    fp4_gemm_backend: "flashinfer_cutlass"
    disable_deep_gemm: true  # NVFP4 scale_fmt != ue8m0 → DeepGemm JIT unoptimized
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true  # full-CG ≈ piecewise > eager on the 122B twin
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 32
    jit_max_jobs: 4
    num_experts: 256  # config.json
    # EP=1 required for the NVFP4 family: flashinfer_cutlass/triton/cutlass MoE all
    # crash at EP>1 (StandardDispatcher EP-combine / shuffle_rows OOB). At EP=1 each
    # GPU holds all 256 experts (TP-sharded intermediate), no per-layer EP all-reduce.
    ep_size: 1
    # EPLB disabled: Qwen3_5MoeForConditionalGeneration lacks
    # 'routed_experts_weights_of_layer' (same as the 122B/397B siblings).
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Base mini card: --reasoning-parser qwen3 --tool-call-parser qwen3_coder.
    # Nex-N2 is an "Agentic Thinking" reasoning/coding model (think tags); qwen3
    # parser separates the reasoning trace. qwen3_coder = XML-style <tool_call>
    # <function=…> calls (do NOT use qwen25/hermes JSON parsers — they leak tags).
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # Base mini card recommended sampling.
    recommended_sampling:
      temperature: 0.7
      top_p: 0.95
      top_k: 40
    # Hybrid (Gated-DeltaNet + full-attn) → extra_buffer is MANDATORY (base mini
    # card sets it unconditionally; also required for the radix-cache/MTP path).
    mamba_scheduler_strategy: "extra_buffer"
    # ---- Native MTP / NEXTN speculative decoding (1 built-in MTP layer) ----
    # STAGED but OFF for first-contact boot safety (NEVER booted here; validate the
    # text path FIRST, then flip speculative_enabled: true). The MECHANISM is the
    # validated nvidia/Qwen3.5-122B-A10B-NVFP4 twin: same qwen3_5_moe arch, same
    # 1-layer MTP head, same extra_buffer + enable_spec_v2 requirement (else "not
    # compatible with radix cache" boot crash). s3/d4 is the 122B MATRIX-VALIDATED
    # sweet spot (do NOT raise num_steps past 3). To enable: set speculative_enabled:
    # true (the other keys are already correct). Note: at ~6 GB/GPU weights there is
    # plenty of room for the draft worker here (unlike the heavy MiniMax-M2 lineage).
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
    speculative_eagle_topk: 1
    speculative_draft_model_path: ""  # empty = NEXTN uses the in-checkpoint MTP head
    enable_spec_v2: true
