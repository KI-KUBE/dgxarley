---
# Model profile: RazielXYZ/Nex-N2-Pro-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# Community NVFP4 re-package (RazielXYZ) of nex-agi/Nex-N2-Pro — "an agentic
# model with Agentic Thinking" (coding + agentic productivity), Apache-2.0.
# Base card: https://huggingface.co/nex-agi/Nex-N2-Pro. The Pro-NVFP4 quant card
# is empty; the card-level facts below (base model, license, reasoning/tool
# format, parsers, sampling, multimodal, the extra_buffer requirement) come from
# the BASE nex-agi/Nex-N2-Pro card, and the ARCHITECTURE facts from this quant's
# config.json.
#
# >>> BASE MODEL = Qwen3.5-397B-A17B (the Pro card states it is "built on the
# Qwen3.5-397B-A17B base model", 397B params). So the TRUE matrix-validated twin
# in this repo is nvidia/Qwen3.5-397B-A17B-NVFP4 (nvidia-qwen3.5-397b-a17b-nvfp4
# .yml) — IDENTICAL qwen3_5_moe arch (512 experts, 60 layers, 1-layer MTP), NOT
# the smaller 122B-A10B (256 experts). The ~237 GB NVFP4 footprint below ≈ the
# 397B twin's ~234 GB (a 122B-A10B-NVFP4 would be ~61 GB), confirming the 397B.
#
# >>> ARCHITECTURE = Qwen3.5-MoE (config.json: architectures
# "Qwen3_5MoeForConditionalGeneration", model_type qwen3_5_moe). This profile
# SEEDS the matrix-validated nvidia/Qwen3.5-397B-A17B-NVFP4 knobs (modelopt_fp4
# loader, flashinfer_cutlass MoE+FP4-GEMM, triton attn, EP=1, extra_buffer,
# NEXTN s3/d4, cuda_graph_max_bs 16). config.json facts:
#   * 60 layers, hidden 4096, 32 attn heads, num_key_value_heads 2 (GQA),
#     head_dim 256, partial_rotary_factor 0.25, rope_theta 1e7 (rope_type default
#     → NO YaRN; native window is the cap), vocab 248320.
#   * HYBRID attention: 3 linear_attention (Gated-DeltaNet: 16 K-heads / 64
#     V-heads, head_dim 128) + 1 full_attention, repeated every full_attention_
#     interval=4 across the 60 layers. → MUST run --mamba-scheduler-strategy
#     extra_buffer (the base mini card sets it unconditionally; also mandatory
#     for the radix-cache/MTP path — same "not compatible with radix cache"
#     crash as the Qwen3.5/Qwen3-Next hybrids).
#   * MoE: num_experts 512 (same as the 397B twin; DOUBLE the 122B's 256),
#     num_experts_per_tok 10, moe_intermediate_size 1024,
#     shared_expert_intermediate_size 1024 (1 shared).
#   * MULTIMODAL: vision tower (depth 27, hidden 1152, patch 16, out 4096),
#     image_token_id/video_token_id present → text+image+video (the Pro card is
#     tagged image-text-to-text), like the 397B twin.
#   * Native 1-layer MTP head (config.json mtp_num_hidden_layers 1,
#     mtp_use_dedicated_embeddings false) → NEXTN speculative works the same way
#     as the validated 397B/122B siblings. STAGED but OFF (see MTP block).
#   * Quant: quant_method modelopt, quant_algo NVFP4, group_size 16, kv_cache
#     8-bit float, ~145 modules in the ignore list (attention / shared expert /
#     vision / lm_head / MTP / embeddings stay BF16/FP8). → quantization=
#     modelopt_fp4 (NOT compressed-tensors).
#
# FOOTPRINT: ~237 GB NVFP4 weights on disk (44 shards, usedStorage 236.98 GB) →
# ~59 GB/GPU at TP=4 — ≈ the 397B-A17B-NVFP4 twin (~234 GB). Fits the 4× DGX
# Spark (128 GB each); KV headroom is tighter than the 122B, so start
# mem_fraction_static conservative (0.60) and raise toward the twin's 0.75 once a
# clean boot confirms.
#
# Nex-N2-Pro card recommended SGLang launch (for the BF16 base, 16 GPUs / 2 nodes):
#   python -m sglang.launch_server --model-path <model> --tp 16 --nnodes 2 \
#     --node-rank <r> --dist-init-addr <node0-ip>:20000 \
#     --reasoning-parser qwen3 --tool-call-parser qwen3_coder \
#     --mamba-scheduler-strategy extra_buffer
# (We run TP=4 across the 4 sparks on the NVFP4 quant instead of the card's TP=16
# BF16 2-node layout. Card notes a customized sglang fork; extra_buffer required.)
#
# >>> UNVALIDATED on this cluster — NO boot/matrix run yet. Everything below is
# >>> SEEDED from the validated nvidia/Qwen3.5-397B-A17B-NVFP4 profile (identical
# >>> qwen3_5_moe arch). First boot IS the validation: confirm the text path
# >>> serves, then re-sweep moe/attn/CG and flip MTP on. The vision path is
# >>> UNVERIFIED (no multimodal harness run here, same caveat as the 397B twin).
_model_profile:
  "RazielXYZ/Nex-N2-Pro-NVFP4":
    knowledge_cutoff: null  # not published (Nex-N2-Pro card does not state a cutoff)
    release_date: null  # Pro card: "recently released"; no explicit date published. License: Apache-2.0.
    info_url: "https://huggingface.co/RazielXYZ/Nex-N2-Pro-NVFP4"
    nccl_transport: "roce"
    tp_size: 4
    context_length: 262144  # config.json max_position_embeddings; rope_type default → no YaRN
    quantization: "modelopt_fp4"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # Conservative first-contact start: ~59 GB weights/GPU. Raise toward the 397B
    # twin's validated 0.75 once a clean boot confirms KV headroom; drop if
    # CUDA-graph capture OOMs. With MTP enabled (below), keep ~0.10 lower for the
    # draft KV (same lever as the 397B/122B siblings).
    mem_fraction_static: "0.60"
    # NVFP4 MoE backend: flashinfer_cutlass — the validated 397B/122B-NVFP4 winner
    # (the standalone "cutlass" runner was REMOVED in 0.5.12; fixed at EP=1 in 0.5.12
    # and beats triton MoE across the board). flashinfer_trtllm crashes at boot on
    # GB10 (sm100 GEMM). triton attn + fi_cutlass FP4 GEMM to match the 397B twin.
    moe_runner_backend: "flashinfer_cutlass"
    attention_backend: "triton"  # validated on the 397B twin; A/B flashinfer on the matrix run
    fp4_gemm_backend: "flashinfer_cutlass"
    disable_deep_gemm: true  # NVFP4 scale_fmt != ue8m0 → DeepGemm JIT unoptimized
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true  # full-CG ≈ piecewise > eager on the 397B twin
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 16  # matches the validated 397B twin's matrix value (was 32)
    jit_max_jobs: 4
    num_experts: 512  # config.json (same as the 397B twin); EP still 1 — see below
    # EP=1 required for the NVFP4 family: flashinfer_cutlass/triton/cutlass MoE all
    # crash at EP>1 (StandardDispatcher EP-combine / shuffle_rows OOB). At EP=1 each
    # GPU holds all 512 experts (TP-sharded intermediate), no per-layer EP all-reduce.
    ep_size: 1
    # EPLB disabled: Qwen3_5MoeForConditionalGeneration lacks
    # 'routed_experts_weights_of_layer' (same as the 397B/122B siblings).
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Nex-N2-Pro card: --reasoning-parser qwen3 --tool-call-parser qwen3_coder.
    # Nex-N2-Pro is an "Agentic Thinking" reasoning/coding model (think tags); qwen3
    # parser separates the reasoning trace. qwen3_coder = XML-style <tool_call>
    # <function=…> calls (do NOT use qwen25/hermes JSON parsers — they leak tags).
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # Nex-N2-Pro card recommended sampling.
    recommended_sampling:
      temperature: 0.7
      top_p: 0.95
      top_k: 40
    # Hybrid (Gated-DeltaNet + full-attn) → extra_buffer is MANDATORY (the Nex-N2-Pro
    # card sets it unconditionally; also required for the radix-cache/MTP path).
    mamba_scheduler_strategy: "extra_buffer"
    # ---- Native MTP / NEXTN speculative decoding (1 built-in MTP layer) ----
    # STAGED but OFF for first-contact boot safety (this model has NEVER booted on
    # the cluster, and it's a large multimodal build — validate the text path FIRST,
    # then flip speculative_enabled: true). The MECHANISM is the validated
    # nvidia/Qwen3.5-397B-A17B-NVFP4 twin: same qwen3_5_moe arch, same 1-layer MTP
    # head, same extra_buffer + enable_spec_v2 requirement (else "not compatible with
    # radix cache" boot crash). s3/d4 is the 397B MATRIX-VALIDATED sweet spot (s1/d2
    # weaker; s5/d5 & s5/d7 regress at n=16 — do NOT raise num_steps past 3). To
    # enable: set speculative_enabled: true (the other keys are already correct).
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
    speculative_eagle_topk: 1
    speculative_draft_model_path: ""  # empty = NEXTN uses the in-checkpoint MTP head
    enable_spec_v2: true
