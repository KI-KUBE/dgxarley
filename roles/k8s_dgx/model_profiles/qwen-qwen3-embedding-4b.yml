---
# Model profile: Qwen/Qwen3-Embedding-4B
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# PURPOSE: the cluster's TEXT-EMBEDDING backend — replaces the standalone Ollama
# embedding deployment (roles/k8s_dgx/tasks/ollama_embed.yml, model
# qwen3-embedding:4b-q8_0). Runs as its OWN sglang_instance (`embed`, key →
# prefix "sglang-embed"), ALWAYS single-node tp=1 on one spark — no NCCL/QSFP.
# Launched by the minimal files/sglang_embed_launch.sh (selected via
# is_embedding below), NOT the generation launcher. Consumers: LiteLLM embed
# entry, honcho, hindsight, and OpenWebUI (via LiteLLM). See defaults/main.yml
# _sglang_embed_instance + enable_embedding_model gate.
#
# WHY Qwen3-Embedding and NOT bge-m3: bge-m3 is XLM-RoBERTa and hits sglang#7590
# on GB10/SM121 (position-tensor assert in roberta.py, crash on the 2nd request).
# Qwen3-Embedding is a Qwen3 DECODER with last-token pooling — unaffected. It is
# also the SAME model family already served under Ollama, and its native 2560-dim
# == honcho_embedding_dimensions, so the honcho/hindsight pgvector columns do NOT
# need re-provisioning on cutover.
_model_profile:
  "Qwen/Qwen3-Embedding-4B":
    knowledge_cutoff: null
    release_date: "2025-06-05"  # Qwen3-Embedding series launch
    info_url: "https://huggingface.co/Qwen/Qwen3-Embedding-4B"
    # 4B DENSE Qwen3 decoder repurposed for embeddings (last-token pooling).
    # Native output dim 2560 (MRL-capable, but we serve the native dim). BF16
    # source (~8 GB weights) → trivially fits one GB10 at tp=1. Multilingual +
    # code, context up to 32K. SGLang serves it with --is-embedding (Qwen3
    # decoder embedding path — the embed launcher adds that flag).
    #
    # NOTE: most generation knobs (kv_cache_dtype/mem_fraction/attention_backend)
    # are still resolved by defaults/main.yml even for the embed instance, so the
    # three no-default resolvers (context_length, kv_cache_dtype,
    # mem_fraction_static) MUST be set here. The embed launcher consumes the full
    # resource envelope below (max_total_tokens, max_running_requests,
    # chunked_prefill_size, kv_cache_dtype, page_size, schedule_policy, cuda-graph,
    # dtype, log_level) — generation-only knobs (speculative/MoE/NCCL/…) are inert.
    context_length: 32768       # native max; also the per-request input ceiling
    kv_cache_dtype: "auto"      # required by the resolver; pool dtype (auto=fp16)
    # MEMORY ENVELOPE — pinned by the ABSOLUTE max_total_tokens, NOT the fraction.
    # mem_fraction_static is (weights + KV pool) / TOTAL GPU capacity, so on the
    # shared/time-sliced GB10 a fraction-derived pool shifts with co-tenant memory
    # and instance start order (fragile, non-deterministic). Set the fraction HIGH
    # (headroom only) and let max_total_tokens be the real, start-order-independent
    # cap. SGLang allocates a KV pool even for --is-embedding (sgl #9181), so
    # max_total_tokens is what actually bounds it.
    # WARNING: 0.99 is ONLY safe BECAUSE max_total_tokens caps the real allocation
    # — do NOT drop max_total_tokens while leaving the fraction high, or the pool
    # grabs ~the whole 128 GB unified pool and starves co-tenants.
    mem_fraction_static: "0.99"
    max_total_tokens: 32768     # absolute KV-pool token cap (== context_length)
    # -1 = single-chunk prefill (embedding default; avoids chunked-prefill position
    # handling). NOW consumed by sglang_embed_launch.sh (was hardcoded there).
    chunked_prefill_size: -1
    # Encoder/embedding attention: triton is the conservative, broadly-compatible
    # backend (SGLang's BGE/embedding guidance). flashinfer is a generation pick.
    attention_backend: "triton"
    # Concurrency cap — NOW actually wired into the embed launcher (the minimal
    # launcher previously DROPPED it, so this was a silent no-op falling back to
    # the SGLang default). With max_total_tokens=32768 the pool bounds in-flight
    # tokens regardless; this caps the request count for short inputs.
    max_running_requests: 16
    trust_remote_code: true
    # is_embedding drives BOTH: (1) sglang_is_embedding resolver → SGLANG_IS_EMBEDDING
    # in the ConfigMap, and (2) the instance-template guards (skip QSFP annotation,
    # select the embed launcher). The _sglang_embed_instance sets it too.
    is_embedding: true
    # Image inherited from default_sglang_image. Pin an sm121 variant here only if
    # an embedding-path kernel issue surfaces during validation.
