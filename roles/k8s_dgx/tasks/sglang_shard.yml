---
# Pre-shard the active SGLang model for fast multi-node TP loading.
# Runs as a multi-node job (worker + head), same topology as SGLang itself.
# Each node saves its own TP rank's sharded weights locally.
#
# Usage:
#   ansible-playbook k8s_dgx.yml --tags sglang_shard
#
# Prerequisites:
# - Model must be downloaded (run hf_preload first)
# - Ollama pods should be scaled to 0 (the Job needs full GPU memory)
# - After completion, set load_format: "sharded_state" in the model profile

- name: Skip shard job — load_format is not sharded_state
  ansible.builtin.debug:
    msg: >-
      Shard job skipped: sglang_load_format={{ sglang_load_format }}.
      Set load_format: "sharded_state" in the model profile for
      {{ sglang_model }} to enable sharding.
  when: sglang_load_format != "sharded_state"

- name: Create SGLang shard script ConfigMap
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: sglang-shard-script
        namespace: "{{ sglang_namespace }}"
      data:
        save_sharded.py: "{{ lookup('file', role_path ~ '/files/sglang_save_sharded.py') }}"
        launch.sh: "{{ lookup('file', role_path ~ '/files/sglang_shard_launch.sh') }}"

- name: Create SGLang wait-for-worker script ConfigMap
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: sglang-wait-script
        namespace: "{{ sglang_namespace }}"
      data:
        wait_for_worker.sh: "{{ lookup('file', role_path ~ '/files/sglang_wait_for_worker.sh') }}"

- name: Delete existing SGLang shard Jobs
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: "{{ item }}"
    namespace: "{{ sglang_namespace }}"
  loop: >-
    {{ ['sglang-shard-worker', 'sglang-shard-head'] +
       (range(1, sglang_nnodes | int) | map('string') | map('regex_replace', '^(.+)$', 'sglang-shard-worker-\1') | list) }}

# Workers must start first (same ordering as SGLang deployment).
# The head's NCCL rendezvous needs all workers to be reachable.
- name: Deploy SGLang shard worker Jobs
  when: sglang_load_format == "sharded_state"
  loop: "{{ range(1, sglang_nnodes | int) | list }}"
  loop_control:
    loop_var: worker_rank
    label: "sglang-shard-worker-{{ worker_rank }} (spark{{ worker_rank + 1 }}, rank {{ worker_rank }})"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: "sglang-shard-worker-{{ worker_rank }}"
        namespace: "{{ sglang_namespace }}"
        labels:
          app: sglang-shard
          role: worker
      spec:
        ttlSecondsAfterFinished: 3600
        backoffLimit: 0
        template:
          metadata:
            labels:
              app: sglang-shard
              role: worker
              worker-rank: "{{ worker_rank | string }}"
            annotations:
              k8s.v1.cni.cncf.io/networks: "{{ '[{\"name\":\"qsfp-vf' ~ qsfp_sriov_assignments.sglang_shard.vf ~ '\",\"ips\":[\"' ~ _sglang_shard_qsfp_ips[worker_rank] ~ '/24\"]}]' if qsfp_sriov_enabled | default(false) else 'qsfp-direct-worker' ~ worker_rank }}"
          spec:
            serviceAccountName: sglang-head
            enableServiceLinks: false
            hostIPC: true
            nodeSelector:
              spark-id: "{{ (worker_rank + 1) | string }}"
            restartPolicy: Never
            initContainers:
              - name: model-download
                image: "{{ sglang_image }}"
                command: ["python3", "/scripts/download_models.py"]
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ sglang_model }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_XET
                    value: "{{ hf_hub_disable_xet | default(0) | string }}"
                  - name: HF_XET_HIGH_PERFORMANCE
                    value: "{{ '0' if (hf_hub_xet_disable_high_performance | default(0) | int) else '1' }}"
                  - name: HF_XET_NUM_CONCURRENT_RANGE_GETS
                    value: "{{ hf_xet_num_concurrent_range_gets | default(16) | string }}"
                  - name: HF_HUB_DISABLE_PROGRESS_BARS
                    value: "0"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: preload-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: shard
                image: "{{ sglang_image }}"
                command: ["/bin/bash", "/scripts/launch.sh"]
                env:
                  - name: SGLANG_IMAGE
                    value: "{{ sglang_image }}"
                  - name: NODE_RANK
                    value: "{{ worker_rank | string }}"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ sglang_nnodes | string }}"
                  - name: SGLANG_MODEL
                    value: "{{ sglang_model }}"
                  - name: SGLANG_QUANTIZATION
                    value: "{{ sglang_quantization }}"
                  - name: SGLANG_ATTENTION_BACKEND
                    value: "{{ sglang_attention_backend }}"
                  - name: SGLANG_FP4_GEMM_BACKEND
                    value: "{{ sglang_fp4_gemm_backend }}"
                  - name: SGLANG_MOE_RUNNER_BACKEND
                    value: "{{ sglang_moe_runner_backend }}"
                  # Must match serving: false dequants wo_a fp8→bf16 so the saved
                  # shards (and the param dtypes) line up with the bf16 checkpoint
                  # wo_a. Without it the shard load dies "Downcasting not allowed".
                  - name: SGLANG_OPT_FP8_WO_A_GEMM
                    value: "{{ '1' if sglang_opt_fp8_wo_a_gemm | bool else '0' }}"
                  # DeepGEMM SM121 kernel gaps (#317): hc_prenorm→TileLang,
                  # paged_mqa_logits→torch. Must match serving so the shard Engine
                  # init (kernel_warmup) doesn't assert "Unsupported architecture".
                  - name: SGLANG_OPT_DEEPGEMM_HC_PRENORM
                    value: "{{ '1' if sglang_opt_deepgemm_hc_prenorm | bool else '0' }}"
                  - name: SGLANG_FP8_PAGED_MQA_LOGITS_TORCH
                    value: "{{ '1' if sglang_fp8_paged_mqa_logits_torch | bool else '0' }}"
                  - name: QSFP_IP_SPARK1
                    value: "{{ _sglang_shard_qsfp_ips[0] }}"
                  - name: QSFP_PEER_IPS
                    value: "{{ (_sglang_shard_qsfp_ips[:worker_rank] + _sglang_shard_qsfp_ips[worker_rank + 1:]) | join(',') }}"
                  - name: NCCL_PORT
                    value: "{{ nccl_bootstrap_port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_XET
                    value: "{{ hf_hub_disable_xet | default(0) | string }}"
                  - name: HF_XET_HIGH_PERFORMANCE
                    value: "{{ '0' if (hf_hub_xet_disable_high_performance | default(0) | int) else '1' }}"
                  - name: HF_XET_NUM_CONCURRENT_RANGE_GETS
                    value: "{{ hf_xet_num_concurrent_range_gets | default(16) | string }}"
                  - name: SGLANG_MEM_FRACTION
                    value: "{{ sglang_mem_fraction_static }}"
                  - name: SGLANG_ENABLE_JIT_DEEPGEMM
                    value: "{{ 'false' if sglang_disable_deep_gemm | bool else 'true' }}"
                  - name: PYTORCH_CUDA_ALLOC_CONF
                    value: "expandable_segments:True"
                  - name: NCCL_SOCKET_IFNAME
                    value: "{{ nccl_socket_ifname }}"
                  - name: NCCL_IB_DISABLE
                    value: "1"
                  - name: NCCL_DEBUG
                    value: "INFO"
                  - name: FORCE_RESHARD
                    value: "{{ force_sglang_shard | default(false) | string }}"
                resources:
                  # Burstable QoS (memory request, no memory limit) so the pod
                  # qualifies for swap under kubelet swapBehavior=LimitedSwap.
                  # The request also sets the swap ceiling: (request / node
                  # capacity) × total swap. See sglang_shard_memory_request.
                  requests:
                    memory: "{{ sglang_shard_memory_request }}"
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: shard-script
                    mountPath: /scripts
                    readOnly: true
            volumes:
              - name: hf-cache
                hostPath:
                  path: "{{ hf_cache_path }}"
                  type: DirectoryOrCreate
              - name: preload-script
                configMap:
                  name: sglang-model-download-script
              - name: shard-script
                configMap:
                  name: sglang-shard-script
                  defaultMode: 0755

- name: Deploy SGLang shard head Job
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: sglang-shard-head
        namespace: "{{ sglang_namespace }}"
        labels:
          app: sglang-shard
          role: head
      spec:
        ttlSecondsAfterFinished: 3600
        backoffLimit: 0
        template:
          metadata:
            labels:
              app: sglang-shard
              role: head
            annotations:
              k8s.v1.cni.cncf.io/networks: "{{ '[{\"name\":\"qsfp-vf' ~ qsfp_sriov_assignments.sglang_shard.vf ~ '\",\"ips\":[\"' ~ qsfp_sriov_assignments.sglang_shard.head_ip ~ '/24\"]}]' if qsfp_sriov_enabled | default(false) else 'qsfp-direct' }}"
          spec:
            serviceAccountName: sglang-head
            enableServiceLinks: false
            hostIPC: true
            nodeSelector:
              spark-id: "1"
            restartPolicy: Never
            initContainers:
              - name: model-download
                image: "{{ sglang_image }}"
                command: ["python3", "/scripts/download_models.py"]
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ sglang_model }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_XET
                    value: "{{ hf_hub_disable_xet | default(0) | string }}"
                  - name: HF_XET_HIGH_PERFORMANCE
                    value: "{{ '0' if (hf_hub_xet_disable_high_performance | default(0) | int) else '1' }}"
                  - name: HF_XET_NUM_CONCURRENT_RANGE_GETS
                    value: "{{ hf_xet_num_concurrent_range_gets | default(16) | string }}"
                  - name: HF_HUB_DISABLE_PROGRESS_BARS
                    value: "0"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: preload-script
                    mountPath: /scripts
                    readOnly: true
              - name: wait-for-worker
                image: bitnami/kubectl:latest
                command: ["/bin/sh", "/scripts/wait_for_worker.sh"]
                env:
                  - name: WAIT_NAMESPACE
                    value: "{{ sglang_namespace }}"
                  - name: WAIT_LABEL
                    value: "app=sglang-shard,role=worker"
                  - name: WAIT_COUNT
                    value: "{{ ((sglang_nnodes | int) - 1) | string }}"
                  - name: WAIT_TIMEOUT
                    value: "{{ sglang_wait_timeout | string }}"
                volumeMounts:
                  - name: wait-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: shard
                image: "{{ sglang_image }}"
                command: ["/bin/bash", "/scripts/launch.sh"]
                env:
                  - name: SGLANG_IMAGE
                    value: "{{ sglang_image }}"
                  - name: NODE_RANK
                    value: "0"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ sglang_nnodes | string }}"
                  - name: SGLANG_MODEL
                    value: "{{ sglang_model }}"
                  - name: SGLANG_QUANTIZATION
                    value: "{{ sglang_quantization }}"
                  - name: SGLANG_ATTENTION_BACKEND
                    value: "{{ sglang_attention_backend }}"
                  - name: SGLANG_FP4_GEMM_BACKEND
                    value: "{{ sglang_fp4_gemm_backend }}"
                  - name: SGLANG_MOE_RUNNER_BACKEND
                    value: "{{ sglang_moe_runner_backend }}"
                  # Must match serving: false dequants wo_a fp8→bf16 so the saved
                  # shards (and the param dtypes) line up with the bf16 checkpoint
                  # wo_a. Without it the shard load dies "Downcasting not allowed".
                  - name: SGLANG_OPT_FP8_WO_A_GEMM
                    value: "{{ '1' if sglang_opt_fp8_wo_a_gemm | bool else '0' }}"
                  # DeepGEMM SM121 kernel gaps (#317): hc_prenorm→TileLang,
                  # paged_mqa_logits→torch. Must match serving so the shard Engine
                  # init (kernel_warmup) doesn't assert "Unsupported architecture".
                  - name: SGLANG_OPT_DEEPGEMM_HC_PRENORM
                    value: "{{ '1' if sglang_opt_deepgemm_hc_prenorm | bool else '0' }}"
                  - name: SGLANG_FP8_PAGED_MQA_LOGITS_TORCH
                    value: "{{ '1' if sglang_fp8_paged_mqa_logits_torch | bool else '0' }}"
                  - name: QSFP_IP_SPARK1
                    value: "{{ _sglang_shard_qsfp_ips[0] }}"
                  - name: QSFP_PEER_IPS
                    value: "{{ _sglang_shard_qsfp_ips[1:] | join(',') }}"
                  - name: NCCL_PORT
                    value: "{{ nccl_bootstrap_port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_XET
                    value: "{{ hf_hub_disable_xet | default(0) | string }}"
                  - name: HF_XET_HIGH_PERFORMANCE
                    value: "{{ '0' if (hf_hub_xet_disable_high_performance | default(0) | int) else '1' }}"
                  - name: HF_XET_NUM_CONCURRENT_RANGE_GETS
                    value: "{{ hf_xet_num_concurrent_range_gets | default(16) | string }}"
                  - name: SGLANG_MEM_FRACTION
                    value: "{{ sglang_mem_fraction_static }}"
                  - name: SGLANG_ENABLE_JIT_DEEPGEMM
                    value: "{{ 'false' if sglang_disable_deep_gemm | bool else 'true' }}"
                  - name: PYTORCH_CUDA_ALLOC_CONF
                    value: "expandable_segments:True"
                  - name: NCCL_SOCKET_IFNAME
                    value: "{{ nccl_socket_ifname }}"
                  - name: NCCL_IB_DISABLE
                    value: "1"
                  - name: NCCL_DEBUG
                    value: "INFO"
                  - name: FORCE_RESHARD
                    value: "{{ force_sglang_shard | default(false) | string }}"
                  - name: RSYNC_TARGETS
                    value: "{{ range(2, sglang_nnodes | int + 1) | map('string') | map('regex_replace', '^(.+)$', 'spark\\1') | map('extract', hostvars, 'ansible_host') | join(',') }}"
                  - name: HF_CACHE_HOST_PATH
                    value: "{{ hf_cache_path }}"
                resources:
                  # Burstable QoS (memory request, no memory limit) so the pod
                  # qualifies for swap under kubelet swapBehavior=LimitedSwap.
                  # The request also sets the swap ceiling: (request / node
                  # capacity) × total swap. See sglang_shard_memory_request.
                  requests:
                    memory: "{{ sglang_shard_memory_request }}"
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: shard-script
                    mountPath: /scripts
                    readOnly: true
                  - name: ssh-keys
                    mountPath: /root/.ssh
                    readOnly: true
            volumes:
              - name: hf-cache
                hostPath:
                  path: "{{ hf_cache_path }}"
                  type: DirectoryOrCreate
              - name: preload-script
                configMap:
                  name: sglang-model-download-script
              - name: shard-script
                configMap:
                  name: sglang-shard-script
                  defaultMode: 0755
              - name: wait-script
                configMap:
                  name: sglang-wait-script
                  defaultMode: 0755
              - name: ssh-keys
                hostPath:
                  path: /root/.ssh
                  type: Directory
