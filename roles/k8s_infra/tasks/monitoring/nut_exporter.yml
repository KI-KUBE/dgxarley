---
# =============================================================================
# NUT EXPORTER — Prometheus metrics for UPS monitoring via NUT
# =============================================================================

- name: Nut Exporter — install
  when:
    - nut_exporter_enabled | default(true) | bool
    - not (nut_exporter_teardown | default(false) | bool)
  block:
    - name: Create nut-exporter-secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: nut-exporter-secrets
            namespace: monitoring
          type: Opaque
          stringData:
            NUT_EXPORTER_SERVER: "{{ nut_exporter_server }}"
            NUT_EXPORTER_USERNAME: "{{ nut_exporter_username }}"
            NUT_EXPORTER_PASSWORD: "{{ nut_exporter_password }}"
            # Default vars + battery.runtime (runtimecal), ups.beeper.status, ups.realpower.nominal
            NUT_EXPORTER_VARIABLES: "battery.charge,battery.runtime,battery.voltage,battery.voltage.nominal,input.voltage,input.voltage.nominal,ups.beeper.status,ups.load,ups.realpower.nominal,ups.status"
      register: nut_exporter_secrets

    - name: Create nut-exporter Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nut-exporter
            namespace: monitoring
            labels:
              app.kubernetes.io/name: nut-exporter
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: nut-exporter
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: nut-exporter
                annotations:
                  checksum/config: "{{ nut_exporter_secrets.result.data | to_json | hash('sha256') }}"
                  prometheus.io/scrape: null
                  prometheus.io/port: null
                  prometheus.io/path: null
              spec:
                nodeSelector:
                  kubernetes.io/arch: amd64
                dnsConfig:
                  options:
                    - name: ndots
                      value: "2"
                containers:
                - name: nut-exporter
                  image: druggeri/nut_exporter:3.2.5
                  envFrom:
                  - secretRef:
                      name: nut-exporter-secrets
                  ports:
                  - name: metrics
                    containerPort: 9199
                  livenessProbe:
                    httpGet:
                      path: /metrics
                      port: metrics
                    initialDelaySeconds: 10
                    periodSeconds: 30
                  resources:
                    requests:
                      cpu: 10m
                      memory: 16Mi
                    limits:
                      cpu: 100m
                      memory: 64Mi

    - name: Create nut-exporter Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nut-exporter
            namespace: monitoring
          spec:
            selector:
              app.kubernetes.io/name: nut-exporter
            ports:
            - name: metrics
              port: 9199
              targetPort: metrics

- name: NUT exporter — teardown (opt-in `-e nut_exporter_teardown=true`)
  when: nut_exporter_teardown | default(false) | bool
  block:
    # Shared `monitoring` namespace is NOT deleted — only the exporter's resources.
    - name: Delete NUT exporter resources (monitoring namespace)
      kubernetes.core.k8s:
        state: absent
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
        namespace: monitoring
      loop:
        - { api_version: apps/v1, kind: Deployment, name: nut-exporter }
        - { api_version: v1, kind: Service, name: nut-exporter }
        - { api_version: v1, kind: Secret, name: nut-exporter-secrets }
      loop_control:
        label: "{{ item.kind }}/{{ item.name }}"
