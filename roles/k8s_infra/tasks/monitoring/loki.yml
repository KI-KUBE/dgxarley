---
- name: Create loki namespace
  kubernetes.core.k8s:
    name: loki
    api_version: v1
    kind: Namespace
    state: present


- name: Create loki service
  kubernetes.core.k8s:
    state: present
    definition:
      kind: Service
      apiVersion: v1
      metadata:
        name: loki
        namespace: loki
        labels:
          app: loki
      spec:
        selector:
          app: loki
        ports:
          - port: 3100
            name: loki
            targetPort: 3100
          - port: 9096
            name: lokigrpc
            targetPort: 9096



# Loki runs with auth_enabled=false behind a ClusterIP -- without this policy
# ANY pod in the cluster could query the complete cluster logs via loki:3100.
# The policy makes the loki pods ingress-isolated and only lets traffic from
# its own namespace (plus loki_networkpolicy_extra_namespaces) through.
#
# IMPORTANT: this only takes effect because K3s does NOT run with
# `disable-network-policy: true` (see roles/k3sserver/defaults/main.yml,
# k3s_disable_network_policy). While that flag is true, every NetworkPolicy
# in the cluster is a no-op.
- name: Create loki ingress networkpolicy
  kubernetes.core.k8s:
    state: "{{ 'present' if (loki_networkpolicy_enabled | default(true) | bool) else 'absent' }}"
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: loki-ingress-allow-namespace
        namespace: loki
        labels:
          app: loki
      spec:
        # Targets the loki pods -- only their ingress is restricted.
        podSelector:
          matchLabels:
            app: loki
        policyTypes:
          - Ingress
        ingress:
          # Catch-all: everything from namespace loki is allowed. That covers
          # the promtail DaemonSet (push path, :3100) without pinning it
          # individually. Everything outside is implicitly denied (an empty
          # ingress list = deny). Note: ad-hoc log queries from a debug pod in
          # another namespace are blocked too -- run such a pod in ns loki, or
          # add the namespace to loki_networkpolicy_extra_namespaces.
          # Builds one {namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: <ns>}}}
          # entry per namespace name via three nested dict_kv wraps.
          - from: "{{ (['loki'] + (loki_networkpolicy_extra_namespaces | default([])))
                      | map('community.general.dict_kv', 'kubernetes.io/metadata.name')
                      | map('community.general.dict_kv', 'matchLabels')
                      | map('community.general.dict_kv', 'namespaceSelector') | list }}"


- name: Create loki configmap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: loki-config
        namespace: loki
      data:
        loki-config.yaml: |
          auth_enabled: false

          server:
            http_listen_port: 3100
            grpc_listen_port: 9096

          common:
            path_prefix: /loki
            storage:
              filesystem:
                chunks_directory: /loki/chunks
                rules_directory: /loki/rules
            replication_factor: 1
            ring:
              kvstore:
                store: inmemory

          schema_config:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_tsdb_index_
                  period: 24h

          storage_config:
            tsdb_shipper:
              active_index_directory: /loki/tsdb-index
              cache_location: /loki/tsdb-cache

          ingester:
            max_chunk_age: 24h

          limits_config:
            reject_old_samples: true
            reject_old_samples_max_age: 168h
            allow_structured_metadata: true
            volume_enabled: true
            max_label_names_per_series: 30

- name: Create loki deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: loki-deployment
        namespace: loki
        labels:
          app: loki-deployment
        annotations:
          keel.sh/policy: force
          keel.sh/match-tag: "true"
          keel.sh/pollSchedule: "@every 24h"
          keel.sh/trigger: poll
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: loki
        template:
          metadata:
            labels:
              app: loki
          spec:
            restartPolicy: Always
            nodeSelector:
              kubernetes.io/arch: amd64
            dnsConfig:
              options:
                - name: ndots
                  value: "1"
            initContainers:
              - name: chowner-loki
                image: alpine:latest
                imagePullPolicy: Always
                command: [ "chown", "10001:10001", "/mnt" ]
                resources:
                  requests:
                    cpu: 10m
                    memory: 16Mi
                  limits:
                    cpu: 50m
                    memory: 32Mi
                securityContext:
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: [ "all" ]
                    add: [ "CHOWN" ]
                  runAsUser: 0
                  runAsNonRoot: false
                volumeMounts:
                  - name: lokidata
                    mountPath: /mnt
            containers:
              - name: loki
                image: grafana/loki:3.6
                imagePullPolicy: Always
                args:
                  - "--config.file=/etc/loki/local-config.yaml"
                ports:
                  - containerPort: 3100
                    name: lokiport
                  - containerPort: 9096
                    name: lokigrpc
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 1Gi
                env:
                  - name: NODE_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.hostIP
                volumeMounts:
                  - mountPath: /loki
                    name: lokidata
                  - name: loki-config
                    mountPath: /etc/loki/local-config.yaml
                    subPath: loki-config.yaml
            volumes:
              - name: lokidata
                hostPath:
                  path: "{{ k8s_infra_data_base }}/loki"
                  type: DirectoryOrCreate
              - name: loki-config
                configMap:
                  name: loki-config



- name: Create promtail configmap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: promtail-config
        namespace: loki
      data:
        promtail.yaml: |
          server:
            http_listen_port: 9080
            grpc_listen_port: 0

          clients:
          - url: http://loki.loki.svc.cluster.local.:3100/loki/api/v1/push

          positions:
            filename: /tmp/positions.yaml
          target_config:
            sync_period: 10s
          scrape_configs:
          - job_name: pod-logs
            kubernetes_sd_configs:
              - role: pod
            pipeline_stages:
              - cri: {}
            relabel_configs:
              - source_labels:
                  - __meta_kubernetes_pod_node_name
                target_label: __host__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - action: replace
                replacement: $1
                separator: /
                source_labels:
                  - __meta_kubernetes_namespace
                  - __meta_kubernetes_pod_name
                target_label: job
              - action: replace
                source_labels:
                  - __meta_kubernetes_namespace
                target_label: namespace
              - action: replace
                source_labels:
                  - __meta_kubernetes_pod_name
                target_label: pod
              - action: replace
                source_labels:
                  - __meta_kubernetes_pod_container_name
                target_label: container
              - replacement: /var/log/pods/*$1/*.log
                separator: /
                source_labels:
                  - __meta_kubernetes_pod_uid
                  - __meta_kubernetes_pod_container_name
                target_label: __path__


- name: Create promtail clusterrole
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: promtail-clusterrole
      rules:
        - apiGroups: [""]
          resources:
          - nodes
          - services
          - pods
          verbs:
          - get
          - watch
          - list


- name: Create promtail serviceaccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        namespace: loki
        name: promtail-serviceaccount


- name: Create promtail clusterrolebinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: promtail-clusterrolebinding
      subjects:
          - kind: ServiceAccount
            name: promtail-serviceaccount
            namespace: loki
      roleRef:
          kind: ClusterRole
          name: promtail-clusterrole
          apiGroup: rbac.authorization.k8s.io



- name: Create promtail daemonset
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        namespace: loki
        name: promtail-daemonset
        annotations:
          keel.sh/policy: force
          keel.sh/match-tag: "true"
          keel.sh/pollSchedule: "@every 24h"
          keel.sh/trigger: poll
      spec:
        selector:
          matchLabels:
            name: promtail
        template:
          metadata:
            labels:
              name: promtail
          spec:
            serviceAccount: promtail-serviceaccount
            dnsConfig:
              options:
                - name: ndots
                  value: "1"
            containers:
            - name: promtail-container
              image: grafana/promtail:latest
              imagePullPolicy: Always
              args:
              - -config.file=/etc/promtail/promtail.yaml
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 1000m
                  memory: 256Mi
              env:
              - name: 'HOSTNAME'
                valueFrom:
                  fieldRef:
                    fieldPath: 'spec.nodeName'
              volumeMounts:
              - name: logs
                mountPath: /var/log
              - name: promtail-config
                mountPath: /etc/promtail
            volumes:
            - name: logs
              hostPath:
                path: /var/log
            - name: promtail-config
              configMap:
                name: promtail-config
