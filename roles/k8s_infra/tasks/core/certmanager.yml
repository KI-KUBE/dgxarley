---
# - certmanager.yml

# install cert-manager
# wget https://github.com/cert-manager/cert-manager/releases/download/v1.19.2/cert-manager.yaml -O cert-manager_cert-manager.yml

- name: Attempt to create cert-manager namespace
  kubernetes.core.k8s:
    name: cert-manager
    api_version: v1
    kind: Namespace
    state: present
  register: certmanager

- name: create certmanager crd
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', 'cert-manager_cert-manager.yml') | from_yaml_all }}"



- name: Patch cert-manager controller resources
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cert-manager
        namespace: cert-manager
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/os: "linux"
              kubernetes.io/arch: amd64
            containers:
              - name: cert-manager-controller
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    cpu: 200m
                    memory: 128Mi

- name: Patch cert-manager cainjector resources
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cert-manager-cainjector
        namespace: cert-manager
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/os: "linux"
              kubernetes.io/arch: amd64
            containers:
              - name: cert-manager-cainjector
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi

- name: Patch cert-manager webhook resources
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cert-manager-webhook
        namespace: cert-manager
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/os: "linux"
              kubernetes.io/arch: amd64
            containers:
              - name: cert-manager-webhook
                resources:
                  requests:
                    cpu: 10m
                    memory: 16Mi
                  limits:
                    cpu: 100m
                    memory: 76Mi

- name: Check if cmctl is installed
  shell: which cmctl
  register: cmctl_check
  changed_when: false
  failed_when: false

- name: install cmctl on EXEC-HOST
  shell: >
      OS=$(go env GOOS); ARCH=$(go env GOARCH) ;
      if [ "$(id -u)" = "0" ]; then
        INSTALL_DIR=/usr/local/bin;
      else
        INSTALL_DIR=$HOME/.local/bin;
        mkdir -p $INSTALL_DIR;
      fi;
      echo GO_OS: $OS;
      echo GO_ARCH: $ARCH;
      echo INSTALL_DIR: $INSTALL_DIR;
      URL=https://github.com/cert-manager/cmctl/releases/latest/download/cmctl_${OS}_${ARCH};
      echo -e "\nURL: $URL\n";
      curl -fsSL -o cmctl $URL &&
      chmod a+x cmctl &&
      mv -v cmctl $INSTALL_DIR/
  args:
    chdir: /tmp
  register: cmtclout
  when: cmctl_check.rc != 0

- name: debug cmctl
  debug:
    var: cmtclout
  when:
    - cmtclout is defined

- name: check if api accessible
  shell: "cmctl check api"
  register: cmctl

- name: debug
  debug:
    var: cmctl


- name: Wait for cert-manager webhook to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager-webhook
    namespace: cert-manager
  register: _cm_webhook
  until: >
    _cm_webhook.resources | length > 0 and
    (_cm_webhook.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

# ACME (Let's Encrypt) DNS01 issuers are created generically by looping over
# `certmanager_acme_issuers` (group_vars/all/main/dns.yml) — add a list entry to
# publish a ClusterIssuer for another external DNS zone. The DNS server + TSIG key
# come from the referenced `nsupdate_servers[item.nsupdate]` backend (vaulted via
# Jinja, so no private zone/key appears here). Each backend's TSIG key MUST be
# authorized for its zone on the RFC2136/PowerDNS server. tsigAlgorithm is derived
# from the backend's nsupdate-style name (hmac-sha256 → cert-manager's HMACSHA256).
- name: Create TSIG secrets for ACME DNS01 issuers
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ item.tsig_secret_name }}"
        namespace: cert-manager
      type: generic
      stringData:
        tsig-secret-key: "{{ nsupdate_servers[item.nsupdate].tsig_key_secret }}"
  loop: "{{ certmanager_acme_issuers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create ACME DNS01 ClusterIssuers
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: "{{ item.name }}"
      spec:
        acme:
          email: "{{ item.email | default(certmanager_letsencrypt_email) }}"
          server: "{{ item.acme_server | default('https://acme-v02.api.letsencrypt.org/directory') }}"
          privateKeySecretRef:
            name: "{{ item.private_key_ref }}"
          solvers:
            - dns01:
                rfc2136:
                  nameserver: "{{ item.nameserver | default(nsupdate_servers[item.nsupdate].server ~ ':53') }}"
                  tsigKeyName: "{{ nsupdate_servers[item.nsupdate].tsig_key_name }}"
                  tsigAlgorithm: "{{ item.tsig_algorithm | default(nsupdate_servers[item.nsupdate].tsig_algorithm | upper | replace('-', '')) }}"
                  tsigSecretSecretRef:
                    name: "{{ item.tsig_secret_name }}"
                    key: tsig-secret-key
              selector:
                dnsZones: "{{ item.dns_zones }}"
  loop: "{{ certmanager_acme_issuers }}"
  loop_control:
    label: "{{ item.name }}"
