---
# file: roles/common/handlers/main.yml
- name: localegen
  command: update-locale LC_ALL=de_DE.UTF-8 LANG=de_DE.UTF-8

- name: restart fail2ban
  service:
    name: fail2ban
    state: restarted


- name: restart sshd
  service:
    name: ssh
    state: restarted


- name: restart postfix
  service:
    name: postfix
    state: restarted


- name: execiptablessh
  command: "/root/iptables.sh"

- name: execip6tablessh
  command: "/root/ip6tables_setup.sh"

- name: execrootscripts
  command: "/root/{{ item }}"
  with_items:
    - ipsetgeoallow.sh
    - ipsetgeoblock.sh
    - blacklist.sh
    - blockbadhosts_ipset.sh
    # savetablesandipsets.sh moved to its own handler below. Defined AFTER this
    # one so it runs LAST (handlers fire in definition order), i.e. after
    # iptables.sh + ip6tables_setup.sh + the ipset scripts — not only after the
    # ipset scripts. Otherwise a run that only changes iptables.sh/ip6tables_setup.sh
    # never refreshes the .save snapshots, and a reboot before the 12:00 save-cron
    # leaves stale/missing saves (notably an empty v6 firewall, since rc.local only
    # restores v6 from the .save and never re-runs ip6tables_setup.sh).

- name: savetablesandipsets
  command: "/root/savetablesandipsets.sh"

- name: sysctl reload
  command: sysctl -p

- name: update grub
  command: update-grub

- name: reload udev rules
  command: udevadm control --reload-rules

- name: update initramfs
  command: update-initramfs -u

- name: reload nfs exports
  command: exportfs -ra

