---
# WiFi Interface deaktivieren (kein DHCP, kein Link-Local)
disable_wifi_iface: "wlP9s9"

# OVS Bridge auf den Sparks (VLAN 191 als einziges/untagged VLAN)
wantsopenvswitch: true
ovs_bridge_name: "br0"

# Network (overridden by vault.yml)
dgxsparks_dns_server: "192.168.123.1"
dgxsparks_gateway: "192.168.124.1"

ovs_vlans:
  - id: 124
    primary: true
    untagged: true
    dhcp4: false
    dhcp6: false
    link_local: "[ ]"
    addresses:
      - "192.168.124.{{ host_octet }}/24"
    nameservers:
      addresses:
        - "{{ dgxsparks_dns_server }}"
    routes:
      - to: default
        via: "{{ dgxsparks_gateway }}"
        metric: 100

# DCBX/PFC: switch LLDP-DCBX doesn't auto-configure the ConnectX-7,
# so we set trust=dscp + PFC on tc3 manually to match the CRS812 RoCE config.
set_dcbx_manually: true

# QSFP Point-to-Point Netzwerk zwischen den Sparks
qsfp_network: "10.10.10.0/24"
qsfp_vf_network: "10.10.100.0/24"
qsfp_mtu: 9000

# QSFP Interfaces (ConnectX-7 Dual-PCIe Multi-Host)
# 4 logische Interfaces pro Spark — alle mit MTU 9000 konfiguriert
qsfp_interfaces:
  - "enp1s0f0np0"
  - "enp1s0f1np1"
  - "enP2p1s0f0np0"
  - "enP2p1s0f1np1"

# ulimits
memlock_limit: "unlimited"
stack_limit: 67108864

# Node swap (KEP-2400) — lets a spark use a disk-backed swapfile to absorb the
# transient weight-load peak of borderline models (DeepSeek-V4-Flash-FP8 on
# 4×GB10). Renders kubelet failSwapOn:false + swapBehavior:LimitedSwap (see
# k3sserver defaults / kubelet-config template). Activation still needs, in
# order: (1) a swap device on each spark, (2) a k3s-agent restart to read the
# new config, (3) a Burstable consumer pod with a memory request — the
# sglang_shard Job sets sglang_shard_memory_request for exactly this.
k3s_node_swap_enabled: true
