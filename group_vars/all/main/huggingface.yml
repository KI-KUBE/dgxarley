---
# Public dummy/example values — real values live in group_vars/all/vault/ (git-crypt).
# HuggingFace
hf_token: "hf_CHANGEME"
# HF_HUB_DISABLE_XET propagated to every container that does HF downloads
# (sglang/vllm head+worker+shard, hf_preload, sglang_tune_moe, comfyui, docling).
# 0 = keep hf_xet transfer; 1 = disable it. The real value lives in the vault
# copy (set to 1) — hf_xet's reconstruction has a "Unable to parse string as hex
# hash value" bug against our JuiceFS-backed HF cache. HF reads this as a boolean
# (only 1/true/yes/on disable xet), so leaving the dummy 0 here is a safe default.
hf_hub_disable_xet: 0
# HF_XET_HIGH_PERFORMANCE — same propagation as above, but wired through this
# INVERTED knob (mirrors the hf_hub_disable_* naming). The env var is the negation:
#   HF_XET_HIGH_PERFORMANCE = 1  when  hf_hub_xet_disable_high_performance = 0 (default)
#   HF_XET_HIGH_PERFORMANCE = 0  when  hf_hub_xet_disable_high_performance = 1
# i.e. high-performance transfer is ON by default; set this to 1 to turn it OFF.
# High-perf is the official replacement for the now-ignored HF_HUB_ENABLE_HF_TRANSFER
# and bumps hf_xet concurrency / buffer / parallel-file limits (HF recommends it on
# high-bandwidth hosts with >=64GB RAM — the GB10 sparks have 128GB unified, so it
# fits). NOTE: no-op when HF_HUB_DISABLE_XET=1 turns the whole xet path off.
hf_hub_xet_disable_high_performance: 0
# HF_HUB_DISABLE_TELEMETRY — same propagation as hf_hub_disable_xet, plus /etc/environment
# on the sparks (dgx_prepare, tag hf_env) because the bare-metal podman/quantizer runs are
# what actually hit the Hub as root. 1 = no telemetry. Not a secret, so the real value lives
# here and NOT in the vault copy.
# Two effects, both wanted:
#   - stops the agent/torch fields being appended to the HF user-agent (utils/_headers.py)
#   - stops the AI-agent-harness registry being fetched from {ENDPOINT}/api/agent-harnesses
#     and cached to $HF_HOME/.agent_harnesses.json (utils/_detect_agent.py) — that file
#     showing up in /mnt/jfs is what prompted this knob.
# CAVEAT: the `hf`/`huggingface-cli` CLI calls is_agent() ungated (cli/_output.py, only to
# pick its output format), so a CLI download still fetches+writes the registry file even
# with this set. Only HF_HUB_OFFLINE=1 blocks the fetch outright — not set globally here.
hf_hub_disable_telemetry: 1
# HF_XET_NUM_CONCURRENT_RANGE_GETS — concurrent byte-range GETs from S3 per file on
# the XET transfer path (a xorb/chunk tunable). XET-ONLY: it does NOT affect plain
# HTTPS/LFS downloads (the path used when HF_HUB_DISABLE_XET=1) and is a no-op there.
# Applies to both normal and high-performance xet. HF default is 16; dummy kept at 16
# (neutral no-op), real value in the vault copy. NOTE: the env var was renamed from
# HF_HUB_NUM_CONCURRENT_RANGE_GETS → HF_XET_NUM_CONCURRENT_RANGE_GETS in hf-xet 1.1;
# the ansible var name matches the current env name. HF recommends the HF cache be on
# SSD/NVMe, not a distributed FS — ours is JuiceFS, so tune conservatively.
hf_xet_num_concurrent_range_gets: 16